# Sofle V2.1 Configuration (Wired, No Battery, Per-Key RGB)

# Core
CONFIG_ZMK_KEYBOARD_NAME="Sofle V2.1"
CONFIG_USB=y
CONFIG_BT=n  # Da Wired, Bluetooth deaktivieren

# Display (OLED)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BATTERY=n
CONFIG_I2C=y
CONFIG_I2C_NRF_TWI=y

# PER-KEY RGB MATRIX (NICHT UNDERGLOW!)
CONFIG_ZMK_RGB_MATRIX=y
CONFIG_WS2812=y
CONFIG_PWM=y
CONFIG_PWM_NRF=y

# Encoder (falls vorhanden)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Power Management
CONFIG_ZMK_PM=y
CONFIG_PM=y
