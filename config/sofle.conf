# Sofle V2.1 configuration

# Core
CONFIG_ZMK_KEYBOARD_NAME="Sofle V2.1"
CONFIG_USB=y
CONFIG_BT=n

# Display (OLED)
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BATTERY=n
CONFIG_I2C=y
CONFIG_I2C_NRF_TWI=y

# Per-key RGB via ZMK underglow/led-strip system
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_WS2812=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Power management
CONFIG_ZMK_PM=y
CONFIG_PM=y
